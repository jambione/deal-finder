<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brasfield Deals — NYC→Milan Flight Tracker</title>
<link rel="icon" type="image/png" href="assets/brasfield-logo.png">
<style>
  :root {
    --navy: #1B2438;
    --navy-light: #243050;
    --gold: #C9A44A;
    --gold-dim: rgba(201,164,74,0.15);
    --green: #27c56f;
    --red: #e85555;
    --yellow: #f0b429;
    --bg: #0f1520;
    --card: #1a2236;
    --card2: #1f2840;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: rgba(232,234,240,0.5);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* NAV */
  nav {
    background: var(--navy);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo { width: 36px; height: 36px; object-fit: contain; }
  .nav-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .nav-title span { color: var(--gold); }
  .nav-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 5px; }
  .btn-ghost:hover { background: var(--navy-light); }
  .last-updated { font-size: 11px; color: var(--muted); }

  /* LAYOUT */
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #0f1a2e 100%);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '✈';
    position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
    font-size: 80px; opacity: 0.05;
  }
  .hero-route { font-size: 13px; color: var(--gold); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .hero-price { font-size: 56px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 6px; }
  .hero-price span { font-size: 20px; font-weight: 400; color: var(--muted); }
  .hero-meta { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .hero-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .cabin-pill {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; cursor: pointer; background: none; color: var(--text);
  }
  .cabin-pill.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

  /* SIGNAL BANNER */
  .signal-banner {
    border-radius: 12px; padding: 16px 20px; margin-bottom: 24px;
    display: flex; align-items: flex-start; gap: 14px;
    border: 1px solid;
  }
  .signal-banner.buy_now { background: rgba(39,197,111,0.08); border-color: rgba(39,197,111,0.3); }
  .signal-banner.wait { background: rgba(240,180,41,0.08); border-color: rgba(240,180,41,0.3); }
  .signal-banner.neutral { background: rgba(255,255,255,0.04); border-color: var(--border); }
  .signal-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
  .signal-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .signal-banner.buy_now .signal-label { color: var(--green); }
  .signal-banner.wait .signal-label { color: var(--yellow); }
  .signal-banner.neutral .signal-label { color: var(--muted); }
  .signal-reason { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px; }

  /* PRICE TABLE */
  .price-table { width: 100%; border-collapse: collapse; }
  .price-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); padding: 0 0 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .price-table td { padding: 12px 0 0; vertical-align: top; font-size: 13px; }
  .price-table td:last-child { text-align: right; }
  .price-val { font-size: 18px; font-weight: 700; color: #fff; }
  .price-airline { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge-cabin { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .badge-biz { background: var(--gold-dim); color: var(--gold); }
  .badge-pe { background: rgba(100,160,255,0.1); color: #7ab0ff; }
  .badge-best { background: rgba(39,197,111,0.12); color: var(--green); }

  /* CHART */
  .chart-wrap { position: relative; height: 180px; margin-top: 8px; }
  canvas { width: 100% !important; height: 100% !important; }
  .chart-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* OIL */
  .oil-price { font-size: 32px; font-weight: 800; color: #fff; }
  .oil-unit { font-size: 13px; color: var(--muted); margin-left: 4px; }
  .oil-change { font-size: 13px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .chg-up { color: var(--red); }
  .chg-down { color: var(--green); }
  .chg-flat { color: var(--muted); }

  /* SENTIMENT */
  .sentiment-score { font-size: 40px; font-weight: 800; text-align: center; padding: 12px 0 4px; }
  .sentiment-label { text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .sentiment-bar { height: 8px; border-radius: 4px; margin: 12px 0 8px;
    background: linear-gradient(to right, var(--green), #888, var(--red)); position: relative; }
  .sentiment-marker { position: absolute; top: -4px; width: 16px; height: 16px;
    background: #fff; border-radius: 50%; border: 2px solid var(--navy);
    transform: translateX(-50%); transition: left 0.5s; }
  .sentiment-headlines { margin-top: 12px; }
  .headline-item { font-size: 11px; color: var(--muted); padding: 6px 0;
    border-top: 1px solid var(--border); line-height: 1.4; }
  .hl-bullish { color: #e8a0a0; }
  .hl-bearish { color: #a0e8b0; }

  /* MONTH COMPARISON */
  .month-row { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border); }
  .month-row:last-child { border-bottom: none; }
  .month-name { font-size: 14px; font-weight: 600; }
  .month-price { font-size: 18px; font-weight: 700; }
  .month-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .tag-best { background: rgba(39,197,111,0.15); color: var(--green); }
  .tag-higher { background: rgba(232,85,85,0.1); color: #e89090; }

  /* ROUTE CARDS */
  .route-card { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .route-card:last-child { border-bottom: none; }
  .route-airports { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .route-arrow { color: var(--muted); }
  .route-price { font-size: 20px; font-weight: 800; color: var(--gold); }
  .route-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ALERT BOX */
  .alert-box { background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 24px; }
  .alert-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--gold); }
  .alert-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .alert-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; font-size: 14px; width: 160px; }
  .alert-input:focus { outline: none; border-color: var(--gold); }
  .btn-gold { background: var(--gold); color: var(--navy); border: none; border-radius: 8px;
    padding: 8px 18px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-gold:hover { filter: brightness(1.08); }
  .alert-status { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* FOOTER */
  footer { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 24px; }

  /* NO DATA */
  .no-data { text-align: center; padding: 48px 20px; color: var(--muted); }
  .no-data h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <img class="nav-logo" src="assets/brasfield-logo.png" alt="B" onerror="this.style.display='none'">
    <div>
      <div class="nav-title">Brasfield <span>Deals</span></div>
      <div class="nav-subtitle">NYC → Milan Flight Tracker</div>
    </div>
  </div>
  <div class="nav-right">
    <span class="last-updated" id="last-updated">Loading...</span>
    <button class="btn-ghost" onclick="loadAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</nav>

<div class="page" id="page">
  <div class="no-data"><div class="spinner"></div></div>
</div>

<footer>
  Brasfield Deals · Flight prices update daily · Oil data via EIA · Not financial advice
</footer>

<script>
const BASE = '';
let flightsData = [];
let oilData = {};
let sentimentData = {};
let analysisData = {};
let historyData = [];
let activeCabin = 'business';

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString();
}

function fmtChg(pct) {
  if (pct == null) return '—';
  const sign = pct > 0 ? '+' : '';
  const cls = pct > 0 ? 'chg-up' : pct < 0 ? 'chg-down' : 'chg-flat';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return 'just now';
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

async function loadAll() {
  try {
    const [fl, oil, sent, analysis, hist] = await Promise.all([
      fetch(BASE + 'output/flights.json').then(r => r.json()).catch(() => ({ flights: [] })),
      fetch(BASE + 'output/oil.json').then(r => r.json()).catch(() => ({})),
      fetch(BASE + 'output/sentiment.json').then(r => r.json()).catch(() => ({})),
      fetch(BASE + 'output/analysis.json').then(r => r.json()).catch(() => ({})),
      fetch(BASE + 'output/history.json').then(r => r.json()).catch(() => []),
    ]);
    flightsData = fl.flights || [];
    oilData = oil;
    sentimentData = sent;
    analysisData = analysis;
    historyData = Array.isArray(hist) ? hist : [];

    const ts = fl.generated_at || analysis.generated_at;
    document.getElementById('last-updated').textContent = ts ? 'Updated ' + timeAgo(ts) : '';
    render();
  } catch(e) {
    document.getElementById('page').innerHTML = `<div class="no-data"><h2>Could not load data</h2><p>${esc(e.message)}</p></div>`;
  }
}

function setBestPrice() {
  const cabin = activeCabin;
  const filtered = flightsData.filter(f => f.cabin === cabin);
  if (!filtered.length) return null;
  return filtered.reduce((best, f) => (!best || f.price < best.price) ? f : best, null);
}

function render() {
  const best = setBestPrice();
  const page = document.getElementById('page');

  // Hero
  const heroPrice = best ? fmt(best.price) : '—';
  const heroMeta = best
    ? `${best.cabin === 'business' ? 'Business' : 'Premium Economy'} · ${best.route_label} · ${best.outbound_date} – ${best.return_date} · via ${esc(best.airline)}`
    : 'No data yet — pipeline runs daily at 8am UTC';

  // Signal
  const rec = analysisData.recommendation || 'neutral';
  const signalIcon = rec === 'buy_now' ? '🟢' : rec === 'wait' ? '🟡' : '⚪';
  const signalLabel = rec === 'buy_now' ? 'Buy Now' : rec === 'wait' ? 'Wait' : 'Monitor';
  const signalReason = analysisData.reason || 'Collecting data — check back tomorrow.';

  page.innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="hero-route">✈ New York → Milan · June & July 2027</div>
      <div class="hero-price">${heroPrice} <span>/ person</span></div>
      <div class="hero-meta">${heroMeta}</div>
      <div class="hero-pills">
        <button class="cabin-pill ${activeCabin === 'business' ? 'active' : ''}" onclick="setCabin('business')">Business Class</button>
        <button class="cabin-pill ${activeCabin === 'premium_economy' ? 'active' : ''}" onclick="setCabin('premium_economy')">Premium Economy</button>
      </div>
    </div>

    <!-- SIGNAL BANNER -->
    <div class="signal-banner ${rec}">
      <div class="signal-icon">${signalIcon}</div>
      <div>
        <div class="signal-label">${signalLabel}</div>
        <div class="signal-reason">${esc(signalReason)}</div>
      </div>
    </div>

    <!-- PRICE ALERT -->
    <div class="alert-box">
      <h3>Price Alert</h3>
      <div class="alert-row">
        <input class="alert-input" type="number" id="alert-price" placeholder="Target price $" value="${localStorage.getItem('bd_alert_price') || ''}">
        <button class="btn-gold" onclick="saveAlert()">Set Alert</button>
      </div>
      <div class="alert-status" id="alert-status">${renderAlertStatus(best)}</div>
    </div>

    <!-- TOP ROW: Price history + Oil -->
    <div class="grid-2">
      ${renderChartCard()}
      ${renderOilCard()}
    </div>

    <!-- SECOND ROW: Routes + Month comparison + Sentiment -->
    <div class="grid-3">
      ${renderRoutesCard()}
      ${renderMonthCard()}
      ${renderSentimentCard()}
    </div>

    <!-- PRICE TABLE -->
    ${renderPriceTable()}
  `;

  drawChart();
}

function renderAlertStatus(best) {
  const target = parseFloat(localStorage.getItem('bd_alert_price'));
  if (!target) return 'Set a target price and we\'ll highlight when a fare drops below it.';
  if (!best) return `Alert set for ${fmt(target)}.`;
  if (best.price <= target) return `🔔 Current best (${fmt(best.price)}) is AT or BELOW your target of ${fmt(target)}!`;
  return `Current best is ${fmt(best.price)}. Alert triggers below ${fmt(target)}.`;
}

function saveAlert() {
  const val = document.getElementById('alert-price').value;
  localStorage.setItem('bd_alert_price', val);
  const best = setBestPrice();
  document.getElementById('alert-status').textContent = val
    ? renderAlertStatus(best).replace(/<[^>]*>/g,'')
    : 'Alert cleared.';
}

function renderChartCard() {
  const hasHistory = historyData.some(e => e.cabin === activeCabin);
  return `
    <div class="card">
      <div class="card-title">Price History · ${activeCabin === 'business' ? 'Business' : 'Premium Economy'}</div>
      ${hasHistory
        ? `<div class="chart-wrap"><canvas id="price-chart"></canvas></div>
           <div class="chart-legend">
             <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>June 2027</div>
             <div class="legend-item"><div class="legend-dot" style="background:#7ab0ff"></div>July 2027</div>
           </div>`
        : `<div style="padding:40px 0;text-align:center;color:var(--muted);font-size:13px">
             History builds as the pipeline runs daily.<br>Check back tomorrow.
           </div>`}
    </div>`;
}

function renderOilCard() {
  const price = oilData.current_price;
  return `
    <div class="card">
      <div class="card-title">WTI Crude Oil · $/barrel</div>
      ${price ? `
        <div class="oil-price">${price.toFixed(2)}<span class="oil-unit">$/bbl</span></div>
        <div class="oil-change">
          <span>Week: ${fmtChg(oilData.week_change_pct)}</span>
          <span>Month: ${fmtChg(oilData.month_change_pct)}</span>
          <span>Year: ${fmtChg(oilData.year_change_pct)}</span>
        </div>
        <div style="margin-top:14px;font-size:12px;color:var(--muted);line-height:1.6">
          Oil prices are a leading indicator for jet fuel costs and airline fuel surcharges.
          A sustained rise of 10%+ typically flows into ticket prices within 4–8 weeks.
        </div>
      ` : `<div style="padding:32px 0;text-align:center;color:var(--muted)">No oil data yet</div>`}
    </div>`;
}

function renderRoutesCard() {
  const cabin = activeCabin;
  const routes = {};
  for (const f of flightsData.filter(f => f.cabin === cabin)) {
    const key = `${f.origin}-${f.dest}`;
    if (!routes[key] || f.price < routes[key].price) routes[key] = f;
  }
  const routeList = Object.values(routes).sort((a,b) => a.price - b.price);
  return `
    <div class="card">
      <div class="card-title">Best by Route · ${cabin === 'business' ? 'Business' : 'Premium Economy'}</div>
      ${routeList.length ? routeList.map((r, i) => `
        <div class="route-card">
          <div class="route-airports">
            ${esc(r.origin)} <span class="route-arrow">→</span> ${esc(r.dest)}
            ${i === 0 ? '<span class="month-tag tag-best">Cheapest</span>' : ''}
          </div>
          <div class="route-price">${fmt(r.price)}</div>
          <div class="route-meta">${esc(r.airline)} · ${r.outbound_date}</div>
        </div>
      `).join('') : '<div style="padding:24px 0;text-align:center;color:var(--muted)">No data yet</div>'}
    </div>`;
}

function renderMonthCard() {
  const cabin = activeCabin;
  const byMonth = {};
  for (const f of flightsData.filter(f => f.cabin === cabin)) {
    if (!byMonth[f.month] || f.price < byMonth[f.month].price) byMonth[f.month] = f;
  }
  const june = byMonth['june'];
  const july = byMonth['july'];
  const bestMonth = analysisData.best_month;
  const savings = analysisData.month_savings;

  return `
    <div class="card">
      <div class="card-title">June vs July 2027</div>
      ${june || july ? `
        <div class="month-row">
          <div>
            <div class="month-name">June 2027</div>
            ${june ? `<div class="route-meta">${esc(june.airline)}</div>` : ''}
          </div>
          <div style="text-align:right">
            <div class="month-price">${june ? fmt(june.price) : '—'}</div>
            ${bestMonth === 'june' ? '<span class="month-tag tag-best">Better deal</span>' : ''}
          </div>
        </div>
        <div class="month-row">
          <div>
            <div class="month-name">July 2027</div>
            ${july ? `<div class="route-meta">${esc(july.airline)}</div>` : ''}
          </div>
          <div style="text-align:right">
            <div class="month-price">${july ? fmt(july.price) : '—'}</div>
            ${bestMonth === 'july' ? '<span class="month-tag tag-best">Better deal</span>' : ''}
          </div>
        </div>
        ${savings > 0 ? `<div style="margin-top:14px;font-size:12px;color:var(--muted)">
          ${bestMonth === 'june' ? 'June' : 'July'} saves you ${fmt(savings)} per person.
        </div>` : ''}
      ` : '<div style="padding:24px 0;text-align:center;color:var(--muted)">No data yet</div>'}
    </div>`;
}

function renderSentimentCard() {
  const score = sentimentData.score ?? 0;
  const signal = sentimentData.signal || 'neutral';
  const pct = Math.round((score + 1) / 2 * 100);
  const label = signal === 'bullish_oil' ? 'Bullish Oil — Buy Soon'
              : signal === 'bearish_oil' ? 'Bearish Oil — Prices May Drop'
              : 'Neutral';
  const color = signal === 'bullish_oil' ? 'var(--red)' : signal === 'bearish_oil' ? 'var(--green)' : 'var(--muted)';
  const headlines = sentimentData.top_headlines || [];

  return `
    <div class="card">
      <div class="card-title">Oil & Aviation Sentiment</div>
      <div class="sentiment-score" style="color:${color}">${score >= 0 ? '+' : ''}${score.toFixed(2)}</div>
      <div class="sentiment-label" style="color:${color}">${esc(label)}</div>
      <div class="sentiment-bar">
        <div class="sentiment-marker" style="left:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
        <span>Bearish oil (wait)</span><span>Bullish oil (buy)</span>
      </div>
      ${headlines.length ? `
        <div class="sentiment-headlines">
          ${headlines.map(h => `
            <div class="headline-item ${h.score > 0 ? 'hl-bullish' : 'hl-bearish'}">
              ${esc(h.headline)}
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>`;
}

function renderPriceTable() {
  const rows = flightsData.slice().sort((a,b) => a.price - b.price);
  if (!rows.length) return '';
  const bestPrice = rows[0].price;
  return `
    <div class="card" style="margin-bottom:24px">
      <div class="card-title">All Prices Found Today</div>
      <table class="price-table">
        <thead>
          <tr>
            <th>Route</th>
            <th>Cabin</th>
            <th>Month</th>
            <th>Airline</th>
            <th>Dates</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(f => `
            <tr>
              <td>${esc(f.origin)} → ${esc(f.dest)}</td>
              <td><span class="badge-cabin ${f.cabin === 'business' ? 'badge-biz' : 'badge-pe'}">${f.cabin === 'business' ? 'Business' : 'Prem Eco'}</span></td>
              <td style="text-transform:capitalize">${esc(f.month)}</td>
              <td>${esc(f.airline)}</td>
              <td style="font-size:11px;color:var(--muted)">${esc(f.outbound_date)}</td>
              <td><span class="price-val ${f.price === bestPrice ? 'badge-cabin badge-best' : ''}">${fmt(f.price)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

function drawChart() {
  const canvas = document.getElementById('price-chart');
  if (!canvas) return;
  const cabin = activeCabin;

  const juneData = historyData.filter(e => e.cabin === cabin && e.month === 'june' && e.price).sort((a,b) => a.date > b.date ? 1 : -1);
  const julyData = historyData.filter(e => e.cabin === cabin && e.month === 'july' && e.price).sort((a,b) => a.date > b.date ? 1 : -1);
  if (!juneData.length && !julyData.length) return;

  const dpr = window.devicePixelRatio || 1;
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = wrap.clientWidth, H = wrap.clientHeight;
  const pad = { top: 10, right: 10, bottom: 24, left: 56 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const allPrices = [...juneData, ...julyData].map(e => e.price);
  const minP = Math.min(...allPrices) * 0.97;
  const maxP = Math.max(...allPrices) * 1.03;

  const allDates = [...new Set([...juneData, ...julyData].map(e => e.date))].sort();
  const n = allDates.length;
  if (n < 1) return;

  function xPos(date) { const i = allDates.indexOf(date); return pad.left + (i / Math.max(n-1,1)) * cW; }
  function yPos(p) { return pad.top + (1 - (p - minP) / (maxP - minP)) * cH; }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * cH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const price = maxP - (i / 4) * (maxP - minP);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$' + Math.round(price / 100) * 100, pad.left - 4, y + 4);
  }

  function drawLine(data, color) {
    if (data.length < 1) return;
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach((e, i) => {
      const x = xPos(e.date), y = yPos(e.price);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // Dots
    ctx.fillStyle = color;
    data.forEach(e => {
      ctx.beginPath(); ctx.arc(xPos(e.date), yPos(e.price), 3, 0, Math.PI*2); ctx.fill();
    });
  }

  drawLine(juneData, '#C9A44A');
  drawLine(julyData, '#7ab0ff');
}

function setCabin(cabin) {
  activeCabin = cabin;
  render();
}

loadAll();
</script>
</body>
</html>
